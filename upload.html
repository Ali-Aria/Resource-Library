<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ecfff5" />
    <title>发布资料 - 阿梨资料库</title>
    <meta name="description" content="阿梨资料库资料发布页，用于生成新的 resources.json。" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./upload.css" />
    <script src="./upload.js" defer></script>
  </head>
  <body>
    <div class="page-shell upload-shell">
      <header class="site-header">
        <div class="brand-row" aria-label="阿梨资料库发布页">
          <img class="brand-avatar" src="./assets/avatar.jpg" alt="阿梨头像" />
          <div>
            <h1>发布资料</h1>
            <p class="subtitle">填写资料信息，生成新的资料库 JSON。</p>
            <div class="brand-actions">
              <a class="ghost-link" href="./index.html">返回资料库</a>
            </div>
          </div>
        </div>
      </header>

      <main class="upload-layout">
        <section class="editor-panel" aria-labelledby="editorTitle">
          <div class="panel-heading">
            <div>
              <h2 id="editorTitle">资料信息</h2>
              <p id="jsonStatus">正在读取当前资料...</p>
            </div>
            <span class="count-pill" id="resourceCount">0 条</span>
          </div>

          <form id="resourceForm" class="resource-form">
            <label class="field">
              <span>资料名</span>
              <input name="title" type="text" placeholder="例如：亚马逊图片工作台" required />
            </label>

            <label class="field">
              <span>一句话简介</span>
              <textarea name="description" rows="3" placeholder="用一句话说明资料用途" required></textarea>
            </label>

            <fieldset class="field-group">
              <legend>分类标签</legend>
              <label class="check-pill">
                <input name="categories" type="checkbox" value="教程" checked />
                <span>教程</span>
              </label>
              <label class="check-pill">
                <input name="categories" type="checkbox" value="工具" />
                <span>工具</span>
              </label>
            </fieldset>

            <label class="field">
              <span>搜索标签</span>
              <input name="tags" type="text" placeholder="亚马逊、AI作图、产品图" />
            </label>

            <label class="field">
              <span>更新时间</span>
              <input name="updatedAt" type="date" required />
            </label>

            <label class="field">
              <span>封面图地址</span>
              <input name="cover" type="text" placeholder="assets/covers/example.png 或 https://..." />
            </label>

            <label class="field">
              <span>公众号原文链接</span>
              <input name="articleUrl" type="url" placeholder="https://mp.weixin.qq.com/s/..." />
            </label>

            <div class="field-grid">
              <label class="field">
                <span>百度网盘链接</span>
                <input name="baiduUrl" type="url" placeholder="https://pan.baidu.com/s/..." />
              </label>

              <label class="field">
                <span>百度提取码</span>
                <input name="baiduCode" type="text" placeholder="例如：aiu6" />
              </label>
            </div>

            <label class="field">
              <span>夸克网盘链接</span>
              <input name="quarkUrl" type="url" placeholder="https://pan.quark.cn/s/..." />
            </label>

            <div class="form-actions">
              <button class="primary-button" type="submit">添加到 JSON</button>
              <button class="secondary-button" id="downloadJson" type="button">下载 resources.json</button>
              <button class="secondary-button" id="copyJson" type="button">复制 JSON</button>
              <button class="plain-button" id="clearForm" type="button">清空</button>
            </div>
          </form>

          <p class="status-line" id="actionStatus" role="status" aria-live="polite"></p>
        </section>

        <aside class="preview-panel" aria-labelledby="previewTitle">
          <div class="panel-heading">
            <div>
              <h2 id="previewTitle">实时预览</h2>
              <p>卡片会按首页样式生成。</p>
            </div>
          </div>

          <article class="resource-card preview-card" id="previewCard"></article>

          <label class="field output-field">
            <span>当前 JSON</span>
            <textarea id="jsonOutput" rows="16" readonly></textarea>
          </label>
        </aside>
      </main>

      <footer class="site-footer">生成后替换 data/resources.json，再提交到 GitHub</footer>
    </div>
  </body>
</html>
